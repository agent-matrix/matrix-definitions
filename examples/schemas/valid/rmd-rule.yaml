schema_version: '1.0'
id: RMD-001
title: Blueprint contract is mandatory
domain: ruslan-core
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Every generated project must include MATRIX_BLUEPRINT.yaml as the source of truth for architecture, stack, required
  files, forbidden changes, and tasks.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: create_required_file
  required_files:
  - MATRIX_BLUEPRINT.yaml
validation:
  kind: file_required
  required_files:
  - MATRIX_BLUEPRINT.yaml
matrix_builder:
  expose_in_report: true
  report_section: ruslan-core
  failure_message: Every generated project must include MATRIX_BLUEPRINT.yaml as the source of truth for architecture, stack,
    required files, forbidden changes, and tasks.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to keep AI-coder generation controlled, auditable, and repeatable.
control:
  immutable_after_generation: true
  hash_in_standards_lock: true
matrixhub:
  required_for_publication: true
