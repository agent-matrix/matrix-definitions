name: Rule change
description: Propose a change to a standards or RMD rule.
title: "[Rule change] "
labels: ["definitions"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the request.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain how this affects Matrix Builder, agent-generator, MatrixHub, or generated artifacts.
    validations:
      required: true
