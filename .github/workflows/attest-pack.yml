name: Attest standards pack

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release bundle
        run: |
          python -m pip install --upgrade pyyaml jsonschema
          python tools/build_pack.py
          python tools/generate_sbom.py
          python tools/generate_provenance.py
          python tools/create_release_bundle.py
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: releases/${{ github.ref_name }}/matrix-definitions-${{ github.ref_name }}.tar.gz
      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: releases/${{ github.ref_name }}/matrix-definitions-${{ github.ref_name }}.tar.gz
          sbom-path: releases/${{ github.ref_name }}/sbom.cdx.json
