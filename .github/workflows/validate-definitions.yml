name: Validate definitions

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pyyaml jsonschema pytest
      - name: Validate schemas, rules, contracts, exceptions, and release scripts
        run: |
          python tools/validate_schemas.py
          python tools/validate_rules.py
          python tools/check_rule_ids.py
          python tools/validate_contracts.py
          python tools/validate_exceptions.py
          python tools/build_pack.py
          python tools/generate_sbom.py
          python tools/generate_provenance.py
          python tools/create_release_bundle.py
          python tools/verify_pack.py
          pytest -q
