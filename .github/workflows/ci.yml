name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml pytest jsonschema
      - name: Validate schemas
        run: python tools/validate_schemas.py
      - name: Validate rules
        run: python tools/validate_rules.py
      - name: Check rule IDs
        run: python tools/check_rule_ids.py
      - name: Build pack
        run: python tools/build_pack.py
      - name: Verify pack
        run: python tools/verify_pack.py
      - name: Test
        run: pytest

      - name: Validate canary blueprints
        run: python tools/validate_canaries.py
