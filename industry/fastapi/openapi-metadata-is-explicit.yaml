schema_version: '1.0'
id: FASTAPI-014
title: OpenAPI metadata is explicit
domain: fastapi
severity: medium
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Generated FastAPI apps must define OpenAPI title, version, tags, and schema descriptions for generated clients and docs.
source_refs:
- fastapi.docs.security
applies_to:
  project_types:
  - fastapi-backend
  - fullstack-ai-app
  files: &id001
  - backend/app/main.py
generator:
  action: enforce_config
  required_files: &id002
  - backend/app/main.py
  template_requirements:
  - openapi_metadata_required
  files: *id001
validation:
  kind: openapi_metadata_check
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: fastapi
  failure_message: Generated FastAPI apps must define OpenAPI title, version, tags, and schema descriptions for generated clients and docs.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
