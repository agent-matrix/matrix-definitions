schema_version: '1.0'
id: ASVS-003
title: Secrets must not be hardcoded
domain: application-security
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Generated templates must use environment variables or secret managers and include .env.example without real secrets.
source_refs:
- owasp.asvs
applies_to:
  project_types:
  - all
generator:
  action: validate_and_report
  required_files:
  - .env.example
validation:
  kind: secret_leak_check
matrix_builder:
  expose_in_report: true
  report_section: application-security
  failure_message: Generated templates must use environment variables or secret managers and include .env.example without
    real secrets.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
