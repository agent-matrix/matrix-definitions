schema_version: '1.0'
id: DOCKER-012
title: Image labels identify source and version
domain: docker
severity: low
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Generated Docker images should include OCI labels for source repository, revision, license, and version.
source_refs:
- docker.build.best-practices
applies_to:
  project_types:
  - fastapi-backend
  - fullstack-ai-app
  - api-service
  files: &id001
  - Dockerfile
generator:
  action: render_labels
  required_files: &id002
  - Dockerfile
  template_requirements:
  - oci_labels_required
  files: *id001
validation:
  kind: docker_oci_labels_present
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: docker
  failure_message: Generated Docker images should include OCI labels for source repository, revision, license, and version.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
