schema_version: '1.0'
id: DOCKER-005
title: Compose file should be development-safe
domain: docker
severity: medium
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: docker-compose.yml should be local-first, avoid real secrets, and document development-only defaults.
source_refs:
- docker.build.best-practices
applies_to:
  project_types:
  - all
generator:
  action: validate_and_report
validation:
  kind: compose_dev_safety_check
matrix_builder:
  expose_in_report: true
  report_section: docker
  failure_message: docker-compose.yml should be local-first, avoid real secrets, and document development-only defaults.
agent_generator:
