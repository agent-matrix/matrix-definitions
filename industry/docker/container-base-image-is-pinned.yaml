schema_version: '1.0'
id: DOCKER-007
title: Container base image is pinned
domain: docker
severity: high
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Docker templates must avoid floating base images in production and enterprise profiles.
source_refs:
- docker.build.best-practices
applies_to:
  project_types:
  - fastapi-backend
  - fullstack-ai-app
  - api-service
  files: &id001
  - Dockerfile
generator:
  action: validate_only
  required_files: &id002
  - Dockerfile
  template_requirements:
  - pinned_base_image_required
  files: *id001
validation:
  kind: dockerfile_pinned_base_image
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: docker
  failure_message: Docker templates must avoid floating base images in production and enterprise profiles.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
