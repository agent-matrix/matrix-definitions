schema_version: '1.0'
id: DOCKER-011
title: Build arguments must not carry secrets
domain: docker
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Docker templates must not use ARG or COPY patterns that expose secrets during image build.
source_refs:
- docker.build.best-practices
applies_to:
  project_types:
  - fastapi-backend
  - fullstack-ai-app
  - api-service
  files: &id001
  - Dockerfile
generator:
  action: reject_violation
  required_files: &id002
  - Dockerfile
  template_requirements:
  - docker_no_secret_build_args
  files: *id001
validation:
  kind: docker_secret_scan
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: docker
  failure_message: Docker templates must not use ARG or COPY patterns that expose secrets during image build.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
