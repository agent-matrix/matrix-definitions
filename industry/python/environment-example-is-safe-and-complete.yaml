schema_version: '1.0'
id: PY-011
title: Environment example is safe and complete
domain: python
severity: high
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Templates that use environment variables must include .env.example with placeholders and no real secrets.
source_refs:
- python.packaging.pyproject
applies_to:
  project_types:
  - python-agent
  - fastapi-backend
  - fullstack-ai-app
  files: &id001
  - .env.example
generator:
  action: render_file
  required_files: &id002
  - .env.example
  template_requirements:
  - env_example_required
  - no_real_secret_values
  files: *id001
validation:
  kind: env_example_safe
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: python
  failure_message: Templates that use environment variables must include .env.example with placeholders and no real secrets.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
