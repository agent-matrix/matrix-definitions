domain: python
severity: medium
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Generated Python projects must include project name, description, Python version, license, and authors metadata.
source_refs:
- python.packaging.pyproject
