schema_version: '1.0'
id: PY-015
title: Source layout is deterministic
domain: python
severity: medium
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Generated packages must use a predictable source layout so validators and AI-coder tasks can target files safely.
source_refs:
- python.packaging.pyproject
applies_to:
  project_types:
  - python-agent
  - fastapi-backend
  - fullstack-ai-app
  files: &id001
  - src/
generator:
  action: render_tree
  required_files: &id002
  - src/
  template_requirements:
  - src_layout_required
  files: *id001
validation:
  kind: directory_required
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: python
  failure_message: Generated packages must use a predictable source layout so validators and AI-coder tasks can target files safely.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
