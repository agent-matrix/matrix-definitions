schema_version: '1.0'
id: PY-007
title: Python build-system metadata is explicit
domain: python
severity: high
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Generated Python packages must declare a build backend and build requirements in pyproject.toml.
source_refs:
- python.packaging.pyproject
applies_to:
  project_types:
  - python-agent
  - fastapi-backend
  - fullstack-ai-app
  files: &id001
  - pyproject.toml
generator:
  action: render_file
  required_files: &id002
  - pyproject.toml
  template_requirements:
  - pyproject_build_system_required
  files: *id001
validation:
  kind: pyproject_build_system
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: python
  failure_message: Generated Python packages must declare a build backend and build requirements in pyproject.toml.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
