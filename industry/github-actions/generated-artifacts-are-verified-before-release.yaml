schema_version: '1.0'
id: GHA-011
title: Generated artifacts are verified before release
domain: github-actions
severity: high
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Release workflows must verify checksums and attestations before publishing Matrix Builder artifacts.
source_refs:
- github.artifact-attestations
applies_to:
  project_types:
  - matrixhub-template
  - fullstack-ai-app
  - ai-agent
  files: &id001
  - .github/workflows/release.yml
generator:
  action: render_release_step
  required_files: &id002
  - .github/workflows/release.yml
  template_requirements:
  - artifact_verification_required
  files: *id001
validation:
  kind: artifact_verification_present
  required_files: *id002
matrix_builder:
  expose_in_report: true
  report_section: github-actions
  failure_message: Release workflows must verify checksums and attestations before publishing Matrix Builder artifacts.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
