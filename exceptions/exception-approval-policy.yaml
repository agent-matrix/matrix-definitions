schema_version: '1.0'
policy:
  name: Exception approval policy
  permanent_exceptions_allowed: false
  max_days:
    critical: 30
    high: 60
    medium: 90
    low: 180
  required_fields:
  - id
  - rule_id
  - reason
  - scope
  - owner
  - expires_at
  - compensating_control
  - approved_by
  approval_rules:
    critical: Ruslan Magana approval required
    high: domain maintainer approval required
    medium: maintainer approval required

