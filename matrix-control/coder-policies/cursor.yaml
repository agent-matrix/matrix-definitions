schema_version: '1.0'
policy:
  adapter: cursor
  name: Cursor
  best_for: file-by-file edits inside an existing repository
  prompt_style: editor-scoped prompt with allowed files and forbidden files
  required_context_files:
  - MATRIX_BLUEPRINT.yaml
  - MATRIX_STANDARDS.lock
  - MATRIX_TASKS.md
  - MATRIX_ALLOWED_CHANGES.md
  - MATRIX_ACCEPTANCE_CRITERIA.md
  - MATRIX_VALIDATION.md
  must_include:
  - allowed files
  - forbidden changes
  - acceptance criteria
  - validation commands
  - stop conditions
  - expected output format
  must_not_do:
  - change architecture
  - modify control files
  - add unapproved dependencies
  - invent features outside the task
  - skip tests
rules:
- RMD-101
- RMD-102
- RMD-107
- RMD-108
- RMD-109
- RMD-118
- RMD-119
