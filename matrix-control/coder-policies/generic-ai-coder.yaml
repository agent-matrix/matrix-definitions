schema_version: '1.0'
policy:
  adapter: generic-ai-coder
  name: Generic AI coder
  best_for: any coding assistant that can follow a contract
  prompt_style: tool-agnostic contract-first prompt
  required_context_files:
  - MATRIX_BLUEPRINT.yaml
  - MATRIX_STANDARDS.lock
  - MATRIX_TASKS.md
  - MATRIX_ALLOWED_CHANGES.md
  - MATRIX_ACCEPTANCE_CRITERIA.md
  - MATRIX_VALIDATION.md
  must_include:
  - allowed files
  - forbidden changes
  - acceptance criteria
  - validation commands
  - stop conditions
  - expected output format
  must_not_do:
  - change architecture
  - modify control files
  - add unapproved dependencies
  - invent features outside the task
  - skip tests
rules:
- RMD-101
- RMD-102
- RMD-107
- RMD-108
- RMD-109
- RMD-118
- RMD-119
- RMD-114
