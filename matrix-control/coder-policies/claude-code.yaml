schema_version: '1.0'
policy:
  adapter: claude-code
  name: Claude Code
  best_for: repository-aware implementation with explicit task context
  prompt_style: long-form contract-first prompt with exact files and validation commands
  required_context_files:
  - MATRIX_BLUEPRINT.yaml
  - MATRIX_STANDARDS.lock
  - MATRIX_TASKS.md
  - MATRIX_ALLOWED_CHANGES.md
  - MATRIX_ACCEPTANCE_CRITERIA.md
  - MATRIX_VALIDATION.md
  must_include:
  - allowed files
  - forbidden changes
  - acceptance criteria
  - validation commands
  - stop conditions
  - expected output format
  must_not_do:
  - change architecture
  - modify control files
  - add unapproved dependencies
  - invent features outside the task
  - skip tests
rules:
- RMD-101
- RMD-102
- RMD-107
- RMD-108
- RMD-109
- RMD-118
- RMD-119
- RMD-110
