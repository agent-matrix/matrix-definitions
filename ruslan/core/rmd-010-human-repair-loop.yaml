schema_version: '1.0'
id: RMD-010
title: Repair prompt required after failed validation
domain: ruslan-core
severity: high
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: When validation fails, Matrix Builder or agent-generator must generate a scoped repair prompt instead of silently
  accepting drift.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: generate_repair_prompt_on_failure
validation:
  kind: repair_prompt_available
matrix_builder:
  expose_in_report: true
  report_section: ruslan-core
  failure_message: When validation fails, Matrix Builder or agent-generator must generate a scoped repair prompt instead of
    silently accepting drift.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to keep AI-coder generation controlled, auditable, and repeatable.
