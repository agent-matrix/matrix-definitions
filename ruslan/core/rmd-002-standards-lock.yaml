schema_version: '1.0'
id: RMD-002
title: Standards lock is mandatory
domain: ruslan-core
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Every generated project must include MATRIX_STANDARDS.lock recording the definitions pack, selected quality profile,
  applied rules, and control-file hashes.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: create_required_file
  required_files:
  - MATRIX_STANDARDS.lock
validation:
  kind: standards_lock_required
  required_files:
  - MATRIX_STANDARDS.lock
matrix_builder:
  expose_in_report: true
  report_section: ruslan-core
  failure_message: Every generated project must include MATRIX_STANDARDS.lock recording the definitions pack, selected quality
    profile, applied rules, and control-file hashes.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to keep AI-coder generation controlled, auditable, and repeatable.
