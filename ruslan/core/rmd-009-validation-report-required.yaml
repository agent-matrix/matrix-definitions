schema_version: '1.0'
id: RMD-009
title: Validation report is required
domain: ruslan-core
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Every generated project must include a validation or standards report describing applied rules, checks, warnings,
  and failures.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: create_required_file
  required_files:
  - docs/standards-report.md
validation:
  kind: file_required
  required_files:
  - docs/standards-report.md
matrix_builder:
  expose_in_report: true
  report_section: ruslan-core
  failure_message: Every generated project must include a validation or standards report describing applied rules, checks,
    warnings, and failures.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to keep AI-coder generation controlled, auditable, and repeatable.
