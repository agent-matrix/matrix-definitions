  expose_in_report: true
  report_section: ruslan-core
  failure_message: Generated or edited output must preserve the selected architecture, stack, API contract, and quality profile
    unless a new blueprint is explicitly approved.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to keep AI-coder generation controlled, auditable, and repeatable.
control:
  reject_unapproved_stack_changes: true
  reject_unapproved_service_additions: true
