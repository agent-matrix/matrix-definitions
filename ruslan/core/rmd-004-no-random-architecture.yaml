schema_version: '1.0'
id: RMD-004
title: AI coders must not change the selected architecture
domain: ruslan-core
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Generated or edited output must preserve the selected architecture, stack, API contract, and quality profile unless
  a new blueprint is explicitly approved.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: lock_architecture
validation:
  kind: architecture_drift_detection
