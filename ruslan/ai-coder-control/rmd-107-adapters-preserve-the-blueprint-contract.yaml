schema_version: '1.0'
id: RMD-107
title: AI-coder adapters must preserve the blueprint contract
domain: ruslan-ai-coder-control
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Every AI-coder adapter must include the active blueprint, standards lock, allowed files, forbidden changes,
  and validation commands.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: generate_contract_preserving_adapter
validation:
  kind: adapter_contract_preserved
matrix_builder:
  expose_in_report: true
  report_section: ruslan-ai-coder-control
  failure_message: Every AI-coder adapter must include the active blueprint, standards lock, allowed files, forbidden
    changes, and validation commands.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to make AI coders implement controlled tasks rather than acting as uncontrolled
  architects.
control:
  adapter_required_context:
  - MATRIX_BLUEPRINT.yaml
  - MATRIX_STANDARDS.lock
  - MATRIX_TASKS.md
  - MATRIX_ALLOWED_CHANGES.md
  - MATRIX_ACCEPTANCE_CRITERIA.md
  - MATRIX_VALIDATION.md
