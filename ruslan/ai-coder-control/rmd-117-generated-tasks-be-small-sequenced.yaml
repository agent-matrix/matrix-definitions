schema_version: '1.0'
id: RMD-117
title: Generated tasks must be small and sequenced
domain: ruslan-ai-coder-control
severity: high
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Matrix Builder must break implementation into small ordered tasks instead of giving an AI coder one broad
  build request.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: generate_sequenced_task_pack
  required_files: &id001
  - MATRIX_TASKS.md
validation:
  kind: task_sequence_check
  required_files: *id001
matrix_builder:
  expose_in_report: true
  report_section: ruslan-ai-coder-control
  failure_message: Matrix Builder must break implementation into small ordered tasks instead of giving an AI coder
    one broad build request.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to make AI coders implement controlled tasks rather than acting as uncontrolled
  architects.
