schema_version: '1.0'
id: RMD-103
title: Control files are immutable after generation
domain: ruslan-ai-coder-control
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: AI coders must not modify Matrix control files unless a new blueprint version is created.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: hash_control_files
validation:
  kind: control_file_hash_check
matrix_builder:
  expose_in_report: true
  report_section: ruslan-ai-coder-control
  failure_message: AI coders must not modify Matrix control files unless a new blueprint version is created.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to keep AI-coder generation controlled, auditable, and repeatable.
control:
  immutable_files:
  - MATRIX_BLUEPRINT.yaml
  - MATRIX_STANDARDS.lock
  - MATRIX_ALLOWED_CHANGES.md
  - MATRIX_ACCEPTANCE_CRITERIA.md
  - MATRIX_VALIDATION.md
