schema_version: '1.0'
id: RMD-115
title: Architecture drift detection must run before approval
domain: ruslan-ai-coder-control
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: Matrix Builder must compare the generated or patched project against MATRIX_BLUEPRINT.yaml before approving
  AI-coder output.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: enable_architecture_drift_detection
  required_files: &id001
  - MATRIX_BLUEPRINT.yaml
validation:
  kind: architecture_drift_detection_required
  required_files: *id001
matrix_builder:
  expose_in_report: true
  report_section: ruslan-ai-coder-control
  failure_message: Matrix Builder must compare the generated or patched project against MATRIX_BLUEPRINT.yaml before
    approving AI-coder output.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to make AI coders implement controlled tasks rather than acting as uncontrolled
  architects.
control:
  compare_against:
  - MATRIX_BLUEPRINT.yaml
