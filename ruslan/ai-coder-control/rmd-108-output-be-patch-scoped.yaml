schema_version: '1.0'
id: RMD-108
title: AI-coder output must be patch-scoped
domain: ruslan-ai-coder-control
severity: critical
status: stable
version: 1.0.0
owner: Ruslan Magana
created_at: '2026-06-12T00:00:00Z'
summary: AI-coder output must be returned as a patch or scoped file edits so Matrix Builder can validate the diff
  before approval.
source_refs: []
applies_to:
  project_types:
  - all
generator:
  action: require_patch_or_scoped_edits
validation:
  kind: patch_scoped_output_required
matrix_builder:
  expose_in_report: true
  report_section: ruslan-ai-coder-control
  failure_message: AI-coder output must be returned as a patch or scoped file edits so Matrix Builder can validate
    the diff before approval.
agent_generator:
  enforcement:
    starter: warn
    standard: fail
    production: fail
    enterprise: fail
exceptions:
  allowed: true
  requires_expiry: true
  max_days: 90
rationale: Ruslan Magana Definition used to make AI coders implement controlled tasks rather than acting as uncontrolled
  architects.
control:
  expected_output_formats:
  - unified_diff
  - scoped_file_edits
